<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DROWeb</title>
    <style>
        :root {
            --primary: #5865F2;
            --primary-hover: #4752c4;
            --bg: #36393f;
            --card-bg: #2f3136;
            --text: #dcddde;
            --text-secondary: #72767d;
            --admin: #faa61a;
            --admin-hover: #d48a0e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .card h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .card p {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 14px;
        }

        .discord-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .discord-btn:hover {
            background-color: var(--primary-hover);
        }

        .discord-btn:active {
            transform: scale(0.98);
        }

        .discord-icon {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary);
            margin-bottom: 20px;
        }
            .avatar.hidden {
                display: none;
            }

        .username {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
            .username.hidden {
                display: none;
            }

        .user-id {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }
            .user-id.hidden {
                display: none;
            }

        .admin-btn {
            background-color: var(--admin);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: background-color 0.2s, transform 0.1s;
        }

        .admin-btn:hover {
            background-color: var(--admin-hover);
        }

        .admin-btn:active {
            transform: scale(0.98);
        }
            .admin-btn.hidden {
                display: none;
            }

        .logout-btn {
            background-color: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--text-secondary);
            border-radius: 8px;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
            transition: background-color 0.2s, color 0.2s;
        }

        .logout-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }


            .logout-btn.hidden {
                display: none;
            }


        .play-btn {
            background-color: #43b581;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
            transition: background-color 0.2s, transform 0.1s;
        }
        .play-btn {
            background-color: #43b581;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
            transition: background-color 0.2s, transform 0.1s;
        }

        .play-btn:hover {
            background-color: #369e6d;
        }

        .play-btn.hidden {
            display: none;
        }

        .play-btn:disabled {
            background-color: #99aab5;
            cursor: not-allowed;
            opacity: 0.6;
            pointer-events: none;
        }

        .loading {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>DROWeb</h1>
            <p>Мультиплеерная игра по вселенной Danganronpa</p>

            <button id="discordBtn" class="discord-btn">
                <svg class="discord-icon" viewBox="0 0 24 24">

                </svg>
                Войти через Discord
            </button>

            <img id="avatar" class="avatar hidden" alt="Аватар пользователя">
            <h1 id="username" class="username hidden"></h1>
            <p id="userId" class="user-id hidden"></p>
            <button id="playBtn" class="play-btn hidden">ИГРАТЬ</button>
            <button id="adminPanelBtn" class="admin-btn hidden">ПАНЕЛЬ УПРАВЛЕНИЯ</button>

            <button id="logoutBtn" class="logout-btn hidden">Выйти</button>

        </div>
    </div>

    <script src="js/home.js"></script>
</body>
</html>
