<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DROWeb - Ошибка</title>
    <style>
        :root {
            --primary: #5865F2;
            --error: #f04747;
            --bg: #36393f;
            --card-bg: #2f3136;
            --text: #dcddde;
            --text-secondary: #72767d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .error-icon {
            width: 64px;
            height: 64px;
            fill: var(--error);
            margin-bottom: 20px;
        }

        .card h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: var(--error);
        }

        .card p {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 14px;
        }

        .back-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .back-btn:hover {
            background-color: var(--primary-hover);
        }

        .back-btn:active {
            transform: scale(0.98);
        }

        .back-icon {
            width: 20px;
            height: 20px;
            fill: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <svg class="error-icon" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
            </svg>
            <h1>Ошибка</h1>
            <p>При обработке запроса произошла ошибка</p>

            <a href="/" class="back-btn">
                <svg class="back-icon" viewBox="0 0 24 24">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
                Вернуться на главную
            </a>
        </div>
    </div>
</body>
</html>
