name: CI/CD Pipeline

on:
  # pull_request:
  #   branches: 
  #     - main
  #     - develop
  push:
    branches: 
      - main
      - develop
  workflow_dispatch:

jobs:
  build-and-pack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.bump_version.outputs.new_version }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Determine Version and Tags
      id: bump_version
      run: |
        BASE_VERSION="1.0.${{ github.run_number }}"

        if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="$BASE_VERSION"
          DOCKER_ALIAS="latest"
        else
          VERSION="$BASE_VERSION-dev"
          DOCKER_ALIAS="dev"
        fi

        OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        
        echo "new_version=$VERSION" >> $GITHUB_OUTPUT
        echo "docker_alias=$DOCKER_ALIAS" >> $GITHUB_OUTPUT
        echo "owner_lower=$OWNER_LOWER" >> $GITHUB_OUTPUT
        
        sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/g" DROWeb.UnitySDK/package.json

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Local Tools
      run: dotnet tool restore
      
    - name: Build DROWeb.WebAPI & UnitySDK
      run: |
        dotnet build DROWeb.WebAPI/DROWeb.WebAPI.csproj -c Release
        dotnet nswag openapi2csclient /input:"DROWeb.WebAPI/obj/openapi/DROWeb.WebAPI.json" /output:"DROWeb.UnitySDK/DROWebApiClient.cs" /namespace:DROWeb.UnitySDK /jsonLibrary:NewtonsoftJson /generateDataAnnotations:false
        dotnet build DROWeb.UnitySDK/DROWeb.UnitySDK.csproj -c Release -o DROWeb.UnitySDK/Runtime/

    - name: Generate UnitySDK metafiles
      uses: rouvydev/metagen-gha@v1.4
      with:
        seed: 'random-seed'
        directory: 'DROWeb.UnitySDK'
        
    - name: Publish UPM Package
      run: |
        cd DROWeb.UnitySDK
        echo "//${{ vars.REGISTRY_HOST }}/:_authToken=${{ secrets.VERDACCIO_TOKEN }}" > .npmrc
        npm publish --registry=https://${{ vars.REGISTRY_HOST }}/
        
    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./DROWeb.WebAPI/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ steps.bump_version.outputs.owner_lower }}/droweb-backend:${{ steps.bump_version.outputs.new_version }}
          ghcr.io/${{ steps.bump_version.outputs.owner_lower }}/droweb-backend:${{ steps.bump_version.outputs.docker_alias }}

