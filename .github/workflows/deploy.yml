name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- ИНТЕГРАЦИЯ: Собираем Docker-образ и UPM-пакет ---
  build-and-pack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.bump_version.outputs.new_version }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Динамически вычисляем автора репозитория и версию
    - name: Bump package version and inject scope
      id: bump_version
      run: |
        VERSION="1.0.${{ github.run_number }}"
        
        echo "new_version=$VERSION" >> $GITHUB_OUTPUT
        
        # package.json
        sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/g" DROWeb.UnitySDK/package.json
        
        echo "Лог измененного package.json для проверки:"
        cat DROWeb.UnitySDK/package.json

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Local Tools
      run: dotnet tool restore

    - name: Generate API Client
      run: |
        dotnet build DROWeb.WebAPI/DROWeb.WebAPI.csproj -c Release
        dotnet nswag openapi2csclient /input:"DROWeb.WebAPI/obj/openapi/DROWeb.WebAPI.json" /output:"DROWeb.UnitySDK/Runtime/DROWebApiClient.cs" /namespace:DROWeb.UnitySDK /jsonLibrary:NewtonsoftJson

    # Публикуем UPM-пакет в NPM Реестр
    - name: Publish UPM Package
      run: |
        cd DROWeb.UnitySDK
        echo "//${{ vars.REGISTRY_HOST }}/:_authToken=${{ secrets.VERDACCIO_TOKEN }}" > .npmrc
        npm publish --registry=https://${{ vars.REGISTRY_HOST }}/

    # 4. Собираем Docker-образ и заливаем в ваш Docker Hub (или GitHub Registry)
    # - name: log in to docker hub
    #   uses: docker/login-action@v3
    #   with:
    #     username: ${{ secrets.docker_username }}
    #     password: ${{ secrets.docker_password }}

    # - name: build and push docker image
    #   uses: docker/build-push-action@v5
    #   with:
    #     context: .
    #     file: ./droweb.webapi/dockerfile
    #     push: true
    #     tags: |
    #       droweb-dev/droweb-backend:${{ github.run_number }}
    #       droweb-dev/droweb-backend:latest

